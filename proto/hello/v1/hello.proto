syntax = "proto3";

package hello.v1;

option go_package = "go-gateway/api/hello/v1;hellov1";

// HelloService 示例服务，演示HTTP和WebSocket转发到gRPC
service HelloService {
  // SayHello Unary调用，对应HTTP POST接口
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);

  // ChatStream 双向流式调用，对应WebSocket双向通信
  rpc ChatStream(stream ChatMessage) returns (stream ChatMessage);

  // HealthCheck 健康检查，返回各中间件状态
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string message = 1;
}

message ChatMessage {
  string user = 1;
  string text = 2;
  int64 timestamp = 3;
}

// HealthCheckRequest 健康检查请求
message HealthCheckRequest {
  bool detailed = 1; // 是否返回详细信息
}

// HealthCheckResponse 健康检查响应
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    DEGRADED = 3; // 降级模式（部分中间件不可用）
  }

  ServingStatus status = 1;      // 服务状态
  string version = 2;            // 服务版本
  int64 uptime = 3;              // 运行时长(秒)

  // 各中间件状态
  ComponentStatus mongodb = 4;   // MongoDB状态
  ComponentStatus redis = 5;     // Redis状态
  ComponentStatus kafka = 6;     // Kafka状态

  message ComponentStatus {
    bool available = 1;          // 是否可用
    string message = 2;          // 状态消息
    int64 latency_ms = 3;        // 延迟(毫秒)
  }
}
